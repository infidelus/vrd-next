<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2d2d30"/>
      <stop offset="1" stop-color="#161618"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4aa8ff"/>
      <stop offset="1" stop-color="#1f8be8"/>
    </linearGradient>
  </defs>
  <rect x="16" y="16" width="224" height="224" rx="52" fill="url(#tile)" stroke="#3b3b3e" stroke-width="2"/>
  <!-- film sprockets, left and right edges -->
  <g fill="#3a3a3e">
    <rect x="40" y="70"  width="12" height="16" rx="3"/>
    <rect x="40" y="120" width="12" height="16" rx="3"/>
    <rect x="40" y="170" width="12" height="16" rx="3"/>
    <rect x="204" y="70"  width="12" height="16" rx="3"/>
    <rect x="204" y="120" width="12" height="16" rx="3"/>
    <rect x="204" y="170" width="12" height="16" rx="3"/>
  </g>
  <!-- slim red lightning bolt: the cut/edit marker, a subtle nod to VideoReDo -->
  <polygon points="86,62 72,124 82,124 76,194 96,118 84,118 98,62"
           fill="#ec2b34" stroke="#ffd9db" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- blue play triangle -->
  <polygon points="106,76 106,180 190,128" fill="url(#blue)"/>
</svg>
